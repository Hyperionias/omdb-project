<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CineSearch — Movie Explorer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    /* ─── CSS VARIABLES ─────────────────────────────────────── */
    :root {
      --bg:        #0a0a0a;
      --surface:   #111111;
      --border:    #222222;
      --amber:     #e8a020;
      --amber-dim: #9a6a10;
      --cream:     #f0e8d8;
      --muted:     #555555;
      --text:      #d8d0c0;
      --red:       #c0392b;
      --radius:    6px;
      --transition: 0.25s ease;
    }

    /* ─── RESET ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ─── GRAIN OVERLAY ─────────────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
      opacity: 0.6;
    }

    /* ─── HEADER ─────────────────────────────────────────────── */
    header {
      padding: 48px 24px 32px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    header::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 50%;
      transform: translateX(-50%);
      width: 80px;
      height: 2px;
      background: var(--amber);
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 900;
      font-style: italic;
      color: var(--cream);
      letter-spacing: -0.02em;
      line-height: 1;
    }

    .logo span {
      color: var(--amber);
    }

    .tagline {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.35em;
      color: var(--muted);
      text-transform: uppercase;
      margin-top: 10px;
    }

    /* ─── SEARCH SECTION ─────────────────────────────────────── */
    .search-wrap {
      max-width: 720px;
      margin: 48px auto 0;
      padding: 0 24px;
    }

    .search-bar {
      display: flex;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    .search-bar:focus-within {
      border-color: var(--amber);
      box-shadow: 0 0 0 3px rgba(232,160,32,0.12);
    }

    #searchInput {
      flex: 1;
      background: var(--surface);
      border: none;
      outline: none;
      padding: 16px 20px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      color: var(--cream);
      caret-color: var(--amber);
    }

    #searchInput::placeholder { color: var(--muted); }

    .search-type {
      background: var(--surface);
      border: none;
      border-left: 1px solid var(--border);
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      padding: 0 14px;
      cursor: pointer;
      outline: none;
      transition: color var(--transition), background var(--transition);
    }

    .search-type:hover { color: var(--amber); }

    .search-type option { background: #1a1a1a; }

    #searchBtn {
      background: var(--amber);
      border: none;
      color: #0a0a0a;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0 28px;
      cursor: pointer;
      transition: background var(--transition), transform var(--transition);
      white-space: nowrap;
    }

    #searchBtn:hover  { background: #f0b030; }
    #searchBtn:active { transform: scale(0.97); }

    /* Filters row */
    .filters {
      display: flex;
      gap: 12px;
      margin-top: 14px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .filter-chip {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      padding: 5px 14px;
      border-radius: 100px;
      cursor: pointer;
      transition: all var(--transition);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .filter-chip:hover,
    .filter-chip.active {
      border-color: var(--amber);
      color: var(--amber);
      background: rgba(232,160,32,0.07);
    }

    /* Year filter */
    #yearInput {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      padding: 5px 14px;
      border-radius: 100px;
      outline: none;
      width: 90px;
      transition: all var(--transition);
    }

    #yearInput:focus,
    #yearInput:valid {
      border-color: var(--amber);
      color: var(--amber);
    }

    #yearInput::placeholder { color: var(--muted); }

    /* ─── MAIN CONTENT ───────────────────────────────────────── */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    /* ─── HERO / DETAIL VIEW ─────────────────────────────────── */
    .detail-view {
      display: none;
      animation: fadeUp 0.4s ease both;
    }

    .detail-view.visible { display: block; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: none;
      border: none;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 0;
      margin-bottom: 32px;
      transition: color var(--transition);
    }

    .back-btn:hover { color: var(--amber); }

    .back-btn svg { transition: transform var(--transition); }
    .back-btn:hover svg { transform: translateX(-3px); }

    .movie-hero {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 48px;
      align-items: start;
    }

    @media (max-width: 680px) {
      .movie-hero {
        grid-template-columns: 1fr;
        gap: 28px;
      }
    }

    .poster-wrap {
      position: relative;
    }

    .poster-wrap img {
      width: 100%;
      border-radius: var(--radius);
      display: block;
      box-shadow: 0 32px 64px rgba(0,0,0,0.7);
    }

    .poster-placeholder {
      width: 100%;
      aspect-ratio: 2/3;
      background: var(--surface);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
    }

    .poster-placeholder svg { opacity: 0.2; }

    .rating-badge {
      position: absolute;
      top: -12px;
      right: -12px;
      background: var(--amber);
      color: #0a0a0a;
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 700;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(232,160,32,0.4);
    }

    .movie-info { padding-top: 4px; }

    .movie-meta-top {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .tag {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 4px;
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .tag.amber { border-color: var(--amber-dim); color: var(--amber); }

    .movie-title-hero {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 4vw, 3rem);
      font-weight: 900;
      color: var(--cream);
      line-height: 1.1;
      margin-bottom: 8px;
    }

    .movie-year-hero {
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 24px;
    }

    .movie-plot {
      font-size: 0.95rem;
      line-height: 1.75;
      color: var(--text);
      margin-bottom: 32px;
      padding-left: 16px;
      border-left: 2px solid var(--amber);
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }

    .info-item label {
      display: block;
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .info-item p {
      font-size: 0.9rem;
      color: var(--cream);
      line-height: 1.5;
    }

    .genre-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 20px;
    }

    .genre-tag {
      background: rgba(232,160,32,0.08);
      border: 1px solid rgba(232,160,32,0.25);
      color: var(--amber);
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 5px 12px;
      border-radius: 100px;
    }

    /* Ratings section */
    .ratings-row {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      padding: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-top: 28px;
    }

    .rating-item {
      text-align: center;
    }

    .rating-item .source {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .rating-item .value {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      color: var(--amber);
      font-weight: 700;
    }

    /* ─── RESULTS GRID ───────────────────────────────────────── */
    .results-view {
      display: none;
      animation: fadeUp 0.4s ease both;
    }

    .results-view.visible { display: block; }

    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .results-count {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    .results-count strong { color: var(--amber); }

    .results-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 20px;
    }

    .movie-card {
      cursor: pointer;
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--surface);
      transition: transform var(--transition), border-color var(--transition), box-shadow var(--transition);
      animation: fadeUp 0.4s ease both;
    }

    .movie-card:hover {
      transform: translateY(-6px);
      border-color: var(--amber-dim);
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }

    .card-poster {
      width: 100%;
      aspect-ratio: 2/3;
      object-fit: cover;
      display: block;
    }

    .card-poster-placeholder {
      width: 100%;
      aspect-ratio: 2/3;
      background: #161616;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-poster-placeholder svg { opacity: 0.15; }

    .card-body {
      padding: 14px;
    }

    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--cream);
      line-height: 1.3;
      margin-bottom: 6px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-meta {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    /* ─── EMPTY / ERROR STATE ────────────────────────────────── */
    .state-view {
      display: none;
      text-align: center;
      padding: 80px 24px;
      animation: fadeUp 0.4s ease both;
    }

    .state-view.visible { display: block; }

    .state-icon {
      font-size: 3rem;
      margin-bottom: 20px;
      opacity: 0.5;
    }

    .state-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      color: var(--cream);
      margin-bottom: 10px;
    }

    .state-text {
      font-size: 0.9rem;
      color: var(--muted);
      max-width: 360px;
      margin: 0 auto;
      line-height: 1.7;
    }

    .state-text.error { color: #e05050; }

    /* ─── LOADING ────────────────────────────────────────────── */
    .loader {
      display: none;
      justify-content: center;
      align-items: center;
      padding: 80px;
    }

    .loader.visible { display: flex; }

    .film-reel {
      width: 48px;
      height: 48px;
      border: 3px solid var(--border);
      border-top-color: var(--amber);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── API KEY BANNER ─────────────────────────────────────── */
    .api-banner {
      background: rgba(192,57,43,0.12);
      border: 1px solid rgba(192,57,43,0.4);
      border-radius: var(--radius);
      padding: 14px 20px;
      margin-top: 20px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .api-banner p {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: #e08080;
      line-height: 1.6;
    }

    .api-banner a {
      color: var(--amber);
      text-decoration: none;
    }

    .api-banner a:hover { text-decoration: underline; }

    .api-key-input-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .api-key-input-row input {
      flex: 1;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(192,57,43,0.4);
      color: var(--cream);
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      padding: 8px 12px;
      border-radius: 4px;
      outline: none;
    }

    .api-key-input-row button {
      background: var(--red);
      border: none;
      color: #fff;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      padding: 8px 14px;
      border-radius: 4px;
      cursor: pointer;
      white-space: nowrap;
    }

    /* ─── FOOTER ─────────────────────────────────────────────── */
    footer {
      text-align: center;
      padding: 24px;
      border-top: 1px solid var(--border);
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    footer a { color: var(--amber-dim); text-decoration: none; }

    /* ─── SCROLLBAR ──────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="logo">Cine<span>Search</span></div>
    <p class="tagline">Powered by OMDb · Every Frame a World</p>
  </header>

  <!-- SEARCH -->
  <div class="search-wrap">
    <!-- API Key Banner (shown when no key is set) -->
    <div class="api-banner" id="apiBanner">
      <div>
        <div class="api-key-input-row">
          <input type="text" id="apiKeyInput" placeholder="Paste your API key here..." />
          <button onclick="saveApiKey()">Save Key</button>
        </div>
      </div>
    </div>

    <!-- Search Bar -->
    <div class="search-bar" style="margin-top:20px">
      <input
        type="text"
        id="searchInput"
        placeholder="Search for a movie or series..."
        autocomplete="off"
        spellcheck="false"
      />
      <select class="search-type" id="typeFilter" title="Content type">
        <option value="">ALL</option>
        <option value="movie">FILM</option>
        <option value="series">SERIES</option>
        <option value="episode">EP</option>
      </select>
      <button id="searchBtn">Search</button>
    </div>

    <!-- Filters -->
    <div class="filters">
      <span class="filter-label">Year:</span>
      <input type="number" id="yearInput" min="1888" max="2030" placeholder="e.g. 1999" />
      <span class="filter-label" style="margin-left:8px">Quick:</span>
      <button class="filter-chip" data-query="christopher nolan">Nolan</button>
      <button class="filter-chip" data-query="stanley kubrick">Kubrick</button>
      <button class="filter-chip" data-query="blade runner">Blade Runner</button>
      <button class="filter-chip" data-query="the godfather">Godfather</button>
    </div>
  </div>

  <!-- MAIN -->
  <main>

    <!-- WELCOME STATE -->
    <div class="state-view visible" id="welcomeState">
      <div class="state-icon">🎬</div>
      <h2 class="state-title">Lights, Camera, Search</h2>
      <p class="state-text">Type a movie title or pick a quick filter above to explore the world of cinema.</p>
    </div>

    <!-- LOADING -->
    <div class="loader" id="loader">
      <div class="film-reel"></div>
    </div>

    <!-- ERROR STATE -->
    <div class="state-view" id="errorState">
      <div class="state-icon">🎞</div>
      <h2 class="state-title">Scene Not Found</h2>
      <p class="state-text error" id="errorMsg">Could not find what you're looking for. Try a different title.</p>
    </div>

    <!-- RESULTS GRID -->
    <div class="results-view" id="resultsView">
      <div class="results-header">
        <span class="results-count" id="resultsCount"></span>
      </div>
      <div class="results-grid" id="resultsGrid"></div>
    </div>

    <!-- DETAIL VIEW -->
    <div class="detail-view" id="detailView">
      <button class="back-btn" id="backBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 5l-7 7 7 7"/>
        </svg>
        Back to results
      </button>
      <div id="detailContent"></div>
    </div>

  </main>

  <footer>
    Data provided by <a href="https://www.omdbapi.com" target="_blank">OMDb API</a> · CineSearch SPA
  </footer>

  <script>
    /* ════════════════════════════════════════════════════════
       CONFIG
    ════════════════════════════════════════════════════════ */
    const API_BASE = 'https://www.omdbapi.com/';
    const LS_KEY   = 'cinesearch_state';
    const LS_APIKEY = 'cinesearch_apikey';

    /* ════════════════════════════════════════════════════════
       STATE
    ════════════════════════════════════════════════════════ */
    let state = {
      query:    '',
      year:     '',
      type:     '',
      results:  [],
      selected: null,   // imdbID of selected movie
      view:     'welcome' // 'welcome' | 'results' | 'detail' | 'error'
    };

    let apiKey = localStorage.getItem(LS_APIKEY) || '748e5315';
    let requestCache = {};  // Simple in-memory cache to avoid repeat calls

    /* ════════════════════════════════════════════════════════
       ELEMENTS
    ════════════════════════════════════════════════════════ */
    const searchInput  = document.getElementById('searchInput');
    const searchBtn    = document.getElementById('searchBtn');
    const typeFilter   = document.getElementById('typeFilter');
    const yearInput    = document.getElementById('yearInput');
    const apiBanner    = document.getElementById('apiBanner');
    const apiKeyInput  = document.getElementById('apiKeyInput');
    const welcomeState = document.getElementById('welcomeState');
    const loader       = document.getElementById('loader');
    const errorState   = document.getElementById('errorState');
    const errorMsg     = document.getElementById('errorMsg');
    const resultsView  = document.getElementById('resultsView');
    const resultsGrid  = document.getElementById('resultsGrid');
    const resultsCount = document.getElementById('resultsCount');
    const detailView   = document.getElementById('detailView');
    const detailContent= document.getElementById('detailContent');
    const backBtn      = document.getElementById('backBtn');

    /* ════════════════════════════════════════════════════════
       INIT
    ════════════════════════════════════════════════════════ */
    function init() {
      // Show/hide API banner
      apiBanner.style.display = apiKey ? 'none' : 'flex';

      // Restore state from localStorage
      const saved = localStorage.getItem(LS_KEY);
      if (saved) {
        try {
          const parsed = JSON.parse(saved);
          state = { ...state, ...parsed };
          searchInput.value  = state.query;
          yearInput.value    = state.year;
          typeFilter.value   = state.type;

          // Restore view
          if (state.view === 'results' && state.results.length) {
            renderResults(state.results);
          } else if (state.view === 'detail' && state.selected && state.query) {
            // Re-fetch detail
            if (state.results.length) {
              renderResults(state.results);
              const card = state.results.find(m => m.imdbID === state.selected);
              if (card) fetchDetail(state.selected);
            } else {
              // Fallback: just restore results
              searchMovies(false);
            }
          }
        } catch(e) { /* ignore */ }
      }

      // URL params (alternative persistence method)
      const params = new URLSearchParams(window.location.search);
      const urlQ = params.get('q');
      if (urlQ && !state.query) {
        searchInput.value = urlQ;
        state.query = urlQ;
        searchMovies(false);
      }

      bindEvents();
    }

    /* ════════════════════════════════════════════════════════
       API KEY
    ════════════════════════════════════════════════════════ */
    function saveApiKey() {
      const val = apiKeyInput.value.trim();
      if (!val) return;
      apiKey = val;
      localStorage.setItem(LS_APIKEY, apiKey);
      apiBanner.style.display = 'none';
    }

    /* ════════════════════════════════════════════════════════
       EVENTS
    ════════════════════════════════════════════════════════ */
    function bindEvents() {
      searchBtn.addEventListener('click', () => searchMovies(true));

      searchInput.addEventListener('keydown', e => {
        if (e.key === 'Enter') searchMovies(true);
      });

      backBtn.addEventListener('click', () => {
        state.view     = 'results';
        state.selected = null;
        saveState();
        showView('results');
      });

      // Quick filter chips
      document.querySelectorAll('.filter-chip').forEach(chip => {
        chip.addEventListener('click', () => {
          const q = chip.dataset.query;
          searchInput.value = q;
          state.query = q;
          searchMovies(true);
        });
      });
    }

    /* ════════════════════════════════════════════════════════
       VIEWS
    ════════════════════════════════════════════════════════ */
    function showView(v) {
      welcomeState.classList.remove('visible');
      loader.classList.remove('visible');
      errorState.classList.remove('visible');
      resultsView.classList.remove('visible');
      detailView.classList.remove('visible');

      if (v === 'welcome') welcomeState.classList.add('visible');
      if (v === 'loading') loader.classList.add('visible');
      if (v === 'error')   errorState.classList.add('visible');
      if (v === 'results') resultsView.classList.add('visible');
      if (v === 'detail')  detailView.classList.add('visible');
    }

    /* ════════════════════════════════════════════════════════
       STATE PERSISTENCE
    ════════════════════════════════════════════════════════ */
    function saveState() {
      const toSave = {
        query:    state.query,
        year:     state.year,
        type:     state.type,
        results:  state.results,
        selected: state.selected,
        view:     state.view
      };
      localStorage.setItem(LS_KEY, JSON.stringify(toSave));

      // Also update URL
      const url = new URL(window.location);
      if (state.query) {
        url.searchParams.set('q', state.query);
      } else {
        url.searchParams.delete('q');
      }
      window.history.replaceState({}, '', url);
    }

    /* ════════════════════════════════════════════════════════
       API HELPERS
    ════════════════════════════════════════════════════════ */
    async function apiFetch(params) {
      if (!apiKey) {
        showError('Please set your OMDb API key first.');
        return null;
      }
      const qs = new URLSearchParams({ apikey: apiKey, ...params }).toString();
      const url = `${API_BASE}?${qs}`;

      // Cache check
      if (requestCache[url]) return requestCache[url];

      try {
        const res  = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        requestCache[url] = data;
        return data;
      } catch(err) {
        showError(`Network error: ${err.message}`);
        return null;
      }
    }

    /* ════════════════════════════════════════════════════════
       SEARCH
    ════════════════════════════════════════════════════════ */
    async function searchMovies(updateState = true) {
      const q    = searchInput.value.trim();
      const year = yearInput.value.trim();
      const type = typeFilter.value;

      if (!q) return;

      if (updateState) {
        state.query    = q;
        state.year     = year;
        state.type     = type;
        state.selected = null;
        state.view     = 'loading';
      }

      showView('loading');

      const params = { s: q };
      if (year) params.y = year;
      if (type) params.type = type;

      const data = await apiFetch(params);
      if (!data) return;

      if (data.Response === 'False') {
        showError(data.Error || 'Movie not found.');
        state.view = 'error';
        saveState();
        return;
      }

      state.results = data.Search || [];
      state.view    = 'results';
      saveState();
      renderResults(state.results);
    }

    /* ════════════════════════════════════════════════════════
       RENDER RESULTS
    ════════════════════════════════════════════════════════ */
    function renderResults(movies) {
      resultsGrid.innerHTML = '';
      const total = movies.length;
      resultsCount.innerHTML = `Found <strong>${total}</strong> result${total !== 1 ? 's' : ''} for "<strong>${escHtml(state.query)}</strong>"`;

      movies.forEach((m, i) => {
        const card = document.createElement('div');
        card.className = 'movie-card';
        card.style.animationDelay = `${i * 0.05}s`;
        card.innerHTML = `
          ${m.Poster && m.Poster !== 'N/A'
            ? `<img class="card-poster" src="${escHtml(m.Poster)}" alt="${escHtml(m.Title)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" /><div class="card-poster-placeholder" style="display:none">${filmIcon(32)}</div>`
            : `<div class="card-poster-placeholder">${filmIcon(32)}</div>`
          }
          <div class="card-body">
            <div class="card-title">${escHtml(m.Title)}</div>
            <div class="card-meta">${escHtml(m.Year)} · ${escHtml(m.Type || '')}</div>
          </div>
        `;
        card.addEventListener('click', () => fetchDetail(m.imdbID));
        resultsGrid.appendChild(card);
      });

      showView('results');
    }

    /* ════════════════════════════════════════════════════════
       DETAIL
    ════════════════════════════════════════════════════════ */
    async function fetchDetail(imdbID) {
      showView('loading');
      state.selected = imdbID;
      state.view     = 'detail';
      saveState();

      const data = await apiFetch({ i: imdbID, plot: 'full' });
      if (!data) return;

      if (data.Response === 'False') {
        showError(data.Error || 'Could not load movie details.');
        return;
      }

      renderDetail(data);
    }

    function renderDetail(m) {
      const rating = m.imdbRating && m.imdbRating !== 'N/A' ? m.imdbRating : null;
      const genres = m.Genre && m.Genre !== 'N/A'
        ? m.Genre.split(',').map(g => `<span class="genre-tag">${escHtml(g.trim())}</span>`).join('')
        : '';

      const ratingsHtml = m.Ratings && m.Ratings.length
        ? `<div class="ratings-row">
            ${m.Ratings.map(r => `
              <div class="rating-item">
                <div class="source">${escHtml(r.Source.replace('Internet Movie Database','IMDb').replace('Rotten Tomatoes','Rotten'))}</div>
                <div class="value">${escHtml(r.Value)}</div>
              </div>
            `).join('')}
           </div>`
        : '';

      detailContent.innerHTML = `
        <div class="movie-hero">
          <div class="poster-wrap">
            ${m.Poster && m.Poster !== 'N/A'
              ? `<img src="${escHtml(m.Poster)}" alt="${escHtml(m.Title)}" onerror="this.style.display='none'" />`
              : `<div class="poster-placeholder">${filmIcon(48)}</div>`
            }
            ${rating ? `<div class="rating-badge">${escHtml(rating)}</div>` : ''}
          </div>

          <div class="movie-info">
            <div class="movie-meta-top">
              <span class="tag amber">${escHtml(m.Type || 'movie')}</span>
              ${m.Rated && m.Rated !== 'N/A' ? `<span class="tag">${escHtml(m.Rated)}</span>` : ''}
              ${m.Runtime && m.Runtime !== 'N/A' ? `<span class="tag">${escHtml(m.Runtime)}</span>` : ''}
            </div>

            <h1 class="movie-title-hero">${escHtml(m.Title)}</h1>
            <p class="movie-year-hero">${escHtml(m.Year)}${m.Country && m.Country !== 'N/A' ? ' · ' + escHtml(m.Country) : ''}</p>

            ${m.Plot && m.Plot !== 'N/A'
              ? `<p class="movie-plot">${escHtml(m.Plot)}</p>`
              : ''
            }

            <div class="info-grid">
              ${infoItem('Director', m.Director)}
              ${infoItem('Writer', m.Writer)}
              ${infoItem('Actors', m.Actors)}
              ${infoItem('Language', m.Language)}
              ${infoItem('Awards', m.Awards)}
              ${infoItem('Box Office', m.BoxOffice)}
            </div>

            ${genres ? `<div class="genre-tags">${genres}</div>` : ''}
            ${ratingsHtml}
          </div>
        </div>
      `;

      showView('detail');
    }

    /* ════════════════════════════════════════════════════════
       ERROR
    ════════════════════════════════════════════════════════ */
    function showError(msg) {
      errorMsg.textContent = msg;
      state.view = 'error';
      showView('error');
    }

    /* ════════════════════════════════════════════════════════
       HELPERS
    ════════════════════════════════════════════════════════ */
    function escHtml(str) {
      if (!str || str === 'N/A') return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function infoItem(label, value) {
      if (!value || value === 'N/A') return '';
      return `
        <div class="info-item">
          <label>${label}</label>
          <p>${escHtml(value)}</p>
        </div>
      `;
    }

    function filmIcon(size) {
      return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="7" y2="7"/><line x1="17" y1="7" x2="22" y2="7"/><line x1="17" y1="17" x2="22" y2="17"/><line x1="2" y1="17" x2="7" y2="17"/>
      </svg>`;
    }

    /* ════════════════════════════════════════════════════════
       KICK OFF
    ════════════════════════════════════════════════════════ */
    init();
  </script>
</body>
</html>
